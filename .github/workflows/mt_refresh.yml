name: Malta Ads — 3-Hour Refresh

on:
  schedule:
    - cron: '30 0,3,6,9,12,15,18,21 * * *'   # every 3 hours, 30 min after CY
  workflow_dispatch:

concurrency:
  group: mt-db-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install requests python-dotenv openpyxl

      # ════════════════════════════════════════════════════════════════════════
      # MALTA
      # ════════════════════════════════════════════════════════════════════════

      - name: MT — Fetch new ads
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python check_all_candidates_mt.py --chunk-size 80

      - name: MT — Generate 3h report
        run: python daily_report_mt.py --hours 3

      # ════════════════════════════════════════════════════════════════════════
      # SUMMARY (reads both DBs — CY DB is from last CY run, 30 min ago)
      # ════════════════════════════════════════════════════════════════════════

      - name: Refresh summary Excel
        run: python make_summary_excel.py

      # ── Commit ───────────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add politician_ads_mt.db fetch_state_mt.json  # MT DB + state only (never touch CY DB)
          git add daily_report_mt_*.xlsx summary_*.xlsx || true   # also new Excel files
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "auto(MT): 3h refresh $(date -u +%Y-%m-%dT%H:%M)Z"
            if git pull --rebase origin main; then
              git push
            else
              git rebase --abort
              echo "Rebase conflict — skipping push this run, will retry next run."
            fi
          fi
