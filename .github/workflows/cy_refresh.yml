name: Cyprus Ads — 3-Hour Refresh

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'   # every 3 hours, on the hour
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install requests python-dotenv openpyxl anthropic playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Chromium (only if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Chromium system deps (always)
        run: playwright install-deps chromium

      # ════════════════════════════════════════════════════════════════════════
      # CYPRUS
      # ════════════════════════════════════════════════════════════════════════

      - name: CY — Fetch new ads
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python fetch_by_page_ids_cy.py --since $(date +%Y-%m-%d)

      - name: CY — Classify new ads
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python classify_ads.py --country CY

      - name: CY — Check removed ads
        run: python check_removed_ads_cy.py --concurrency 5 --recheck-days 14 --limit 200

      - name: CY — Generate 3h report
        run: python daily_report_cy.py --hours 3

      # ════════════════════════════════════════════════════════════════════════
      # SUMMARY (reads both DBs — MT DB is from last MT run)
      # ════════════════════════════════════════════════════════════════════════

      - name: Refresh summary Excel
        run: python make_summary_excel.py

      # ── Commit ───────────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add politician_ads.db || true
          git add daily_report_*.xlsx summary_*.xlsx || true
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "auto(CY): 3h refresh $(date -u +%Y-%m-%dT%H:%M)Z"
            git push
          fi
