name: Cyprus & Malta Ads — 3-Hour Refresh

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'   # every 3 hours
  workflow_dispatch:                           # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout repo (with DBs) ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv openpyxl anthropic playwright
          playwright install chromium --with-deps

      # ════════════════════════════════════════════════════════════════════════
      # CYPRUS
      # ════════════════════════════════════════════════════════════════════════

      # ── 3. Fetch new CY ads (today only) ────────────────────────────────────
      - name: CY — Fetch new ads
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python fetch_by_page_ids_cy.py --since $(date +%Y-%m-%d)

      # ── 4. Classify unclassified CY ads ─────────────────────────────────────
      - name: CY — Classify new ads
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python classify_ads.py --country CY

      # ── 5. Check CY removals ────────────────────────────────────────────────
      - name: CY — Check removed ads
        run: python check_removed_ads_cy.py

      # ── 6. Generate CY 3-hour report ────────────────────────────────────────
      - name: CY — Generate 3h report
        run: python daily_report_cy.py --hours 3

      # ════════════════════════════════════════════════════════════════════════
      # MALTA
      # ════════════════════════════════════════════════════════════════════════

      # ── 7. Fetch new MT ads (incremental) ───────────────────────────────────
      - name: MT — Fetch new ads
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python check_all_candidates_mt.py

      # ── 8. Classify unclassified MT ads ─────────────────────────────────────
      - name: MT — Classify new ads
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python classify_ads.py --country MT

      # ── 9. Check MT removals ────────────────────────────────────────────────
      - name: MT — Check removed ads
        run: python check_removed_ads_mt.py

      # ════════════════════════════════════════════════════════════════════════
      # SHARED
      # ════════════════════════════════════════════════════════════════════════

      # ── 9. Refresh summary Excel (CY + MT) ──────────────────────────────────
      - name: Refresh summary Excel
        run: python make_summary_excel.py

      # ── 10. Commit updated DBs + reports back to repo ────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add politician_ads.db politician_ads_mt.db fetch_state.json || true
          git add daily_report_*.xlsx summary_*.xlsx || true
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "auto: 3h refresh $(date -u +%Y-%m-%dT%H:%M)Z"
            git push
          fi
