name: Cyprus Ads — 3-Hour Refresh

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'   # every 3 hours, on the hour
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install requests python-dotenv openpyxl

      # ════════════════════════════════════════════════════════════════════════
      # CYPRUS
      # ════════════════════════════════════════════════════════════════════════

      - name: CY — Fetch new ads (known pages)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python fetch_by_page_ids_cy.py --since $(date -d "1 day ago" +%Y-%m-%d)

      - name: CY — Scan candidate list chunk (Greek names)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python check_all_candidates.py --chunk-size 120

      - name: CY — Scan candidate list chunk (Latin names)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python check_all_candidates_latin.py --chunk-size 120

      - name: CY — Generate 3h report
        run: python daily_report_cy.py --hours 3

      # ════════════════════════════════════════════════════════════════════════
      # SUMMARY (reads both DBs — MT DB is from last MT run)
      # ════════════════════════════════════════════════════════════════════════

      - name: Refresh summary Excel
        run: python make_summary_excel.py

      # ── Commit ───────────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add politician_ads.db fetch_state.json  # CY DB + state only (never touch MT DB)
          git add daily_report_*.xlsx summary_*.xlsx || true   # also new Excel files
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "auto(CY): 3h refresh $(date -u +%Y-%m-%dT%H:%M)Z"
            if git pull --rebase origin main; then
              git push
            else
              git rebase --abort
              echo "Rebase conflict — skipping push this run, will retry next run."
            fi
          fi
