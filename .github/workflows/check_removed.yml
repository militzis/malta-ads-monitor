name: Check Removed Ads — CY + MT

on:
  schedule:
    - cron: '0 1,7,13,19 * * *'   # every 6 hours: 01:00, 07:00, 13:00, 19:00 UTC
  workflow_dispatch:

jobs:
  check-removed:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python + Playwright setup ─────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install requests python-dotenv playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Chromium (only if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      - name: Install Chromium system deps (always)
        run: playwright install-deps chromium

      # ── 3. Check removed ads ─────────────────────────────────────────────────
      - name: CY — Check removed ads
        run: python check_removed_ads_cy.py --concurrency 3 --recheck-days 0.25 --limit 400

      - name: MT — Check removed ads
        run: python check_removed_ads_mt.py --concurrency 3 --recheck-days 0.25 --limit 200

      # ── 4. Commit ────────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "auto: removal check $(date -u +%Y-%m-%dT%H:%M)Z"
            if git pull --rebase origin main; then
              git push
            else
              git rebase --abort
              echo "Rebase conflict — skipping push this run, will retry next run."
            fi
          fi
