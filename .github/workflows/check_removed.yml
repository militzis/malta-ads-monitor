name: Check Removed Ads — CY + MT

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'   # every 6 hours: 02:00, 08:00, 14:00, 20:00 UTC
  workflow_dispatch:

concurrency:
  group: db-write
  cancel-in-progress: false

jobs:
  check-removed:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install requests python-dotenv openpyxl

      # ── 3. Check removed ads via Meta API (no browser) ───────────────────────
      - name: Check removed ads (CY + MT)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_ACCESS_TOKEN_MT: ${{ secrets.META_ACCESS_TOKEN_MT }}
        run: python check_removed_ads_api.py --recheck-days 7 --sleep 1 --max-pages 150

      # ── 4. Commit ────────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "auto: removal check $(date -u +%Y-%m-%dT%H:%M)Z"
            if git pull --rebase origin main; then
              git push
            else
              git rebase --abort
              echo "Rebase conflict — skipping push this run, will retry next run."
            fi
          fi
