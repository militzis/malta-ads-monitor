name: Check Removed Ads — Active Pages (Hourly)

on:
  schedule:
    - cron: '45 */2 * * *'   # every 2 hours at :45 — avoids overlap with cy_refresh (:00) and mt_refresh (:45+run time)
  workflow_dispatch:

concurrency:
  group: active-check
  cancel-in-progress: false

jobs:
  check-active:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. Fast active-only removal check ────────────────────────────────────
      # Only checks pages that currently have a running ad.
      # Volume has grown as the election approaches — allow 30 min.
      - name: Check active pages for removals (CY + MT)
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_ACCESS_TOKEN_MT: ${{ secrets.META_ACCESS_TOKEN_MT }}
        run: python check_removed_ads_api.py --active-only --sleep 0.5

      # ── 4. Commit ────────────────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "auto: active-check $(date -u +%Y-%m-%dT%H:%M)Z"
            if git pull --rebase origin main; then
              git push
            else
              git rebase --abort
              echo "Rebase conflict — skipping push this run, will retry next run."
            fi
          fi
